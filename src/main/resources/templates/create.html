<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Book a Treatment</title></head>
<body>
<section layout:fragment="content">
    <div class="form-card" style="max-width:600px;">
        <h1 class="form-title">Book a Treatment</h1>
        <p class="form-subtitle">Select your treatments and preferred time</p>

        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/bookings/create}" th:object="${bookingDto}" method="post">

            <!-- TREATMENTS -->
            <div class="form-group">
                <label>Select Treatments</label>
                <div style="border:1px solid var(--border); background:var(--cream); padding:1rem; display:flex; flex-direction:column; gap:0.7rem;">
                    <div th:each="treatment : ${treatments}" style="display:flex; align-items:center; gap:0.7rem;">
                        <input type="checkbox"
                               th:value="${treatment.id}"
                               name="treatmentIds"
                               th:id="${'t-' + treatment.id}"
                               class="treatment-cb"
                               th:attr="data-duration=${treatment.durationMinutes}"/>
                        <label th:for="${'t-' + treatment.id}"
                               style="font-size:0.88rem; text-transform:none; letter-spacing:0; color:var(--dark); cursor:pointer;">
                            <span th:text="${treatment.name}">Massage</span>
                            <span style="color:var(--muted);"
                                  th:text="' — ' + ${treatment.durationMinutes} + ' min — €' + ${treatment.price}">
                            </span>
                        </label>
                    </div>
                </div>
                <span class="field-error" th:if="${#fields.hasErrors('treatmentIds')}"
                      th:errors="*{treatmentIds}"></span>
            </div>

            <!-- DATE -->
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="bookingDate" th:field="*{bookingDate}"
                       th:min="${today}"/>
                <span class="field-error" th:if="${#fields.hasErrors('bookingDate')}"
                      th:errors="*{bookingDate}"></span>
            </div>

            <!-- TIME SLOT -->
            <div class="form-group">
                <label>Available Time Slots</label>
                <select id="startTime" th:field="*{startTime}">
                    <option value="">-- Select a date first --</option>
                </select>
                <span class="field-error" th:if="${#fields.hasErrors('startTime')}"
                      th:errors="*{startTime}"></span>
            </div>

            <!-- STAFF -->
            <div class="form-group">
                <label>Therapist (optional)</label>
                <select th:field="*{staffId}">
                    <option value="">-- No preference --</option>
                    <option th:each="staff : ${staffList}"
                            th:value="${staff.id}"
                            th:text="${staff.firstName + ' ' + staff.lastName + (staff.specialization != null ? ' — ' + staff.specialization : '')}">
                    </option>
                </select>
            </div>

            <!-- NOTES -->
            <div class="form-group">
                <label>Notes (optional)</label>
                <textarea th:field="*{notes}" placeholder="Any preferences or health notes..."></textarea>
            </div>

            <!-- TOTAL -->
            <div style="background:var(--cream); border:1px solid var(--border); padding:1rem; margin-bottom:1.5rem; display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:0.78rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted);">
                    Estimated Total
                </span>
                <span id="totalPrice" style="font-family:'Cormorant Garamond',serif; font-size:1.5rem; color:var(--dark);">
                    €0.00
                </span>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;">Confirm Booking</button>
        </form>
    </div>

    <script th:inline="javascript">
        // load time slots when date changes
        document.getElementById('bookingDate').addEventListener('change', function () {
            const date = this.value;
            if (!date) return;
            fetch('/bookings/available-slots?date=' + date)
                .then(res => res.json())
                .then(slots => {
                    const select = document.getElementById('startTime');
                    select.innerHTML = '<option value="">-- Select a time --</option>';
                    if (slots.length === 0) {
                        select.innerHTML = '<option value="">No slots available for this date</option>';
                        return;
                    }
                    slots.forEach(slot => {
                        const opt = document.createElement('option');
                        opt.value = slot;
                        opt.textContent = slot;
                        select.appendChild(opt);
                    });
                });
        });

        // calculate total price from selected treatments
        document.querySelectorAll('.treatment-cb').forEach(cb => {
            cb.addEventListener('change', updateTotal);
        });

        function updateTotal() {
            // prices passed from Thymeleaf as a map if needed
            // for now just sum durations as a placeholder
            const checked = document.querySelectorAll('.treatment-cb:checked');
            let total = 0;
            // prices need to be embedded — see note below
            document.getElementById('totalPrice').textContent = '€' + total.toFixed(2);
        }
    </script>
</section>
</body>
</html>
