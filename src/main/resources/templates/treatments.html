<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Treatments</title></head>
<body>
<section>

    <div class="page-header" style="display:flex; justify-content:space-between; align-items:flex-end;">
        <div>
            <h1>Our Treatments</h1>
            <p>Choose from our range of expertly curated spa treatments</p>
        </div>
        <!-- ADMIN only -->
        <a th:href="@{/treatments/form}" class="btn btn-gold">+ Add Treatment</a>
    </div>

    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>Treatment</th>
                <th>Duration</th>
                <th>Price</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="treatment : ${treatmentsDto}">
                <td>
                    <strong th:text="${treatment.name}">Deep Tissue Massage</strong>
                    <p style="color:var(--muted); font-size:0.82rem; margin-top:0.2rem;"
                       th:text="${treatment.description}">Description here</p>
                </td>
                <td th:text="${treatment.durationMinutes} + ' min'">60 min</td>
                <td th:text="'€' + ${treatment.price}">€60.00</td>
                <td style="text-align:right;">
                    <!-- ADMIN only -->
                    <a th:href="@{/treatments/edit/{id}(id=${treatment.id})}"
                       class="btn btn-outline btn-sm">Edit</a>
                    <form th:action="@{/treatments/delete/{id}(id=${treatment.id})}"
                          method="post" style="display:inline;">
                        <button type="submit" class="btn btn-danger btn-sm"
                                onclick="return confirm('Delete this treatment?')">
                            Delete
                        </button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(treatments)}">
                <td colspan="4" style="text-align:center; color:var(--muted); padding:2rem;">
                    No treatments available yet.
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</section>
</body>
</html>
