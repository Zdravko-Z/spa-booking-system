<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register — Serenity Spa</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>
    <div class="form-card form-card-wide">
        <h1 class="form-title">Create Account</h1>
        <p class="form-subtitle">Join us and start booking treatments</p>

        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/register}" th:object="${registerDto}" method="post">

            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" th:field="*{firstName}" placeholder="Ana"/>
                    <span class="field-error" th:if="${#fields.hasErrors('firstName')}"
                          th:errors="*{firstName}"></span>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" th:field="*{lastName}" placeholder="Ivanova"/>
                    <span class="field-error" th:if="${#fields.hasErrors('lastName')}"
                          th:errors="*{lastName}"></span>
                </div>
            </div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" th:field="*{username}" placeholder="ana.ivanova"/>
                <span class="field-error" th:if="${#fields.hasErrors('username')}"
                      th:errors="*{username}"></span>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}" placeholder="ana@example.com"/>
                <span class="field-error" th:if="${#fields.hasErrors('email')}"
                      th:errors="*{email}"></span>
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="text" th:field="*{phone}" placeholder="0888123456"/>
                <span class="field-error" th:if="${#fields.hasErrors('phone')}"
                      th:errors="*{phone}"></span>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" th:field="*{password}" placeholder="••••••••"/>
                    <span class="field-error" th:if="${#fields.hasErrors('password')}"
                          th:errors="*{password}"></span>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" th:field="*{confirmPassword}" placeholder="••••••••"/>
                    <span class="field-error" th:if="${#fields.hasErrors('confirmPassword')}"
                          th:errors="*{confirmPassword}"></span>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">
                Create Account
            </button>
        </form>

        <p style="text-align:center; margin-top:1.5rem; font-size:0.84rem; color:var(--muted);">
            Already have an account?
            <a th:href="@{/login}" style="color:var(--gold);">Sign in</a>
        </p>
    </div>
</main>
<footer>&copy; 2026 Serenity Spa &nbsp;&mdash;&nbsp; All rights reserved</footer>
</body>
</html>
