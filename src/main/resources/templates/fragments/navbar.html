<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:lang="${#locale.language}"
      lang="${#locale.language}">
<head>
    <title th:text="#{nav.brand}">Serenity Spa</title>
</head>
<body>
<nav th:fragment="navbar">
    <a th:href="@{/}" class="nav-brand">SERENITY SPA</a>
    <div class="nav-links">
        <a th:href="@{/}" th:text="#{nav.home}">Home</a>
        <a sec:authorize="isAuthenticated() and !hasRole('ADMIN')"
           th:href="@{/bookings/create}" th:text="#{nav.book}">Book Now</a>
        <a sec:authorize="isAuthenticated() and !hasRole('ADMIN')"
           th:href="@{/bookings/my-bookings}" th:text="#{nav.mybookings}">My Bookings</a>
        <a sec:authorize="hasRole('ADMIN')"
           th:href="@{/admin/dashboard}" th:text="#{nav.dashboard}">Dashboard</a>
        <a sec:authorize="!isAuthenticated()" th:href="@{/login}" th:text="#{nav.login}">Login</a>
        <a sec:authorize="!isAuthenticated()" th:href="@{/register}" class="nav-btn" th:text="#{nav.register}">Register</a>
        <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
            <button type="submit" class="nav-btn" th:text="#{nav.logout}">Logout</button>
        </form>
        <div class="language-switcher">
        <a th:if="${#locale.language == 'en'}" th:href="@{?lang=bg}" class="lang-toggle" title="Switch to Bulgarian">
            <span class="lang-code">EN</span>
        </a>
        <a th:if="${#locale.language == 'bg'}" th:href="@{?lang=en}" class="lang-toggle" title="Switch to English">
            <span class="lang-code">BG</span>
        </a>
    </div>
    </div>
</nav>
</body>
</html>
