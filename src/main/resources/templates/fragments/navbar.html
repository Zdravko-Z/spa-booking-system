<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar">
    <a th:href="@{/}" class="nav-brand">SERENITY SPA</a>
    <div class="nav-links">
        <a th:href="@{/}">Home</a>
        <a sec:authorize="isAuthenticated() and !hasRole('ADMIN')"
           th:href="@{/bookings/create}">Book Now</a>
        <a sec:authorize="isAuthenticated() and !hasRole('ADMIN')"
           th:href="@{/bookings/my-bookings}">My Bookings</a>
        <a  sec:authorize="hasRole('ADMIN')"
           th:href="@{/admin/dashboard}">Dashboard</a>
        <a sec:authorize="!isAuthenticated()" th:href="@{/login}">Login</a>
        <a sec:authorize="!isAuthenticated()" th:href="@{/register}" class="nav-btn">Register</a>
        <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
            <button type="submit" class="nav-btn">Logout</button>
        </form>
    </div>
</nav>
</body>
</html>
