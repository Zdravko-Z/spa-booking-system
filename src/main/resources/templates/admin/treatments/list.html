<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Manage Treatments — Serenity Spa</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main>
    <div class="page-header">
        <h1>Treatments</h1>
        <a th:href="@{/admin/treatments/create}" class="btn btn-primary">Add New</a>
    </div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${#lists.isEmpty(treatments)}" class="empty-state">
        <p>No treatments found. <a th:href="@{/admin/treatments/create}">Add one</a></p>
    </div>
    <div th:if="not ${#lists.isEmpty(treatments)}" class="table-wrapper">
        <table class="table table-striped">
            <thead>
            <tr>
                <th>Name</th>
                <th>Duration</th>
                <th>Price</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="t : ${treatments}" th:classappend="${t.deleted} ? 'row-deleted' : ''">
                <td th:text="${t.name}"></td>
                <td th:text="${t.durationMinutes} + ' min'"></td>
                <td th:text="'€' + ${t.price}"></td>
                <td>
                        <span class="badge"
                              th:classappend="${t.deleted} ? 'badge-deleted' : 'badge-active'"
                              th:text="${t.deleted} ? 'Deleted' : 'Active'">
                        </span>
                </td>
                <td class="td-actions">
                    <a th:href="@{/admin/treatments/edit/{id}(id=${t.id})}" class="btn btn-warning btn-sm">Edit</a>

                    <form th:action="${t.deleted} ? @{/admin/treatments/restore/{id}(id=${t.id})} : @{/admin/treatments/delete/{id}(id=${t.id})}"
                          method="post" class="inline-form">
                        <button type="submit"
                                th:class="${t.deleted} ? 'btn btn-gold btn-sm' : 'btn btn-danger btn-sm'"
                                th:text="${t.deleted} ? 'Restore' : 'Delete'"
                                th:onclick="${t.deleted} ? 'return confirm(\'Restore this treatment?\')' : 'return confirm(\'Delete this treatment?\')'">
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<footer>&copy; 2026 Serenity Spa &nbsp;&mdash;&nbsp; All rights reserved</footer>
</body>
</html>
