<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${treatmentDto.id == null ? 'Add Treatment' : 'Edit Treatment'}">Treatment Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main>
    <div class="container">
        <div class="form-card">
            <h1 class="form-title" th:text="${treatmentDto.id == null ? 'Add Treatment' : 'Edit Treatment'}">Add Treatment</h1>
            <p class="form-subtitle" th:text="${treatmentDto.id == null ? 'Create a new treatment' : 'Update treatment details'}">Create a new treatment</p>
            <!-- Error alert -->
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <form th:action="${treatmentDto.id == null ? '/admin/treatments/create' : '/admin/treatments/edit/' + treatmentDto.id}"
                  th:object="${treatmentDto}"
                  method="post">
                <!-- Hidden id for edit -->
                <input type="hidden" th:field="*{id}"/>
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" th:field="*{name}" placeholder="e.g. Deep Tissue Massage"/>
                    <span class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea th:field="*{description}" rows="3" placeholder="Brief description"></textarea>
                    <span class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
                </div>
                <div class="form-group">
                    <label>Duration (minutes)</label>
                    <input type="number" th:field="*{durationMinutes}" placeholder="60" min="1"/>
                    <span class="field-error" th:if="${#fields.hasErrors('durationMinutes')}" th:errors="*{durationMinutes}"></span>
                </div>
                <div class="form-group">
                    <label>Price (€)</label>
                    <input type="number" step="0.01" th:field="*{price}" placeholder="60.00" min="0.01"/>
                    <span class="field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" th:text="${treatmentDto.id == null ? 'Create' : 'Update'}">Save</button>
                    <a th:href="@{/admin/treatments}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>
<footer>&copy; 2026 Serenity Spa &nbsp;&mdash;&nbsp; All rights reserved</footer>
</body>
</html>
