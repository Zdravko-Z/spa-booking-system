<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Manage Rooms — Serenity Spa</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main>
    <div class="container">
        <!-- Page Header -->
        <div class="page-header">
            <h1>Rooms</h1>
        </div>
        <!-- Alerts -->
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(rooms)}" class="empty-state">
            <p>No rooms found.</p>
        </div>
        <!-- Table -->
        <div th:if="not ${#lists.isEmpty(rooms)}" class="table-wrapper">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Capacity</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="room : ${rooms}">
                    <td th:text="${room.name}"></td>
                    <td th:text="${room.capacity}"></td>
                    <td>
                            <span class="badge"
                                  th:classappend="${'badge-' + room.status.name().toLowerCase()}"
                                  th:text="${room.status}">
                            </span>
                    </td>
                    <td class="td-actions">
                        <a th:href="@{/admin/rooms/edit/{id}(id=${room.id})}" class="btn btn-warning btn-sm">Edit</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<footer>&copy; 2026 Serenity Spa &nbsp;&mdash;&nbsp; All rights reserved</footer>
</body>
</html>
