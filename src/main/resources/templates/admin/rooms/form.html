<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:lang="${#locale.language}"
      lang="${#locale.language}">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{rooms.form.title}">Edit Room — Serenity Spa</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main>
    <div class="container">
        <div class="form-card">
            <h1 class="form-title" th:text="#{rooms.form.heading}">Edit Room</h1>
            <p class="form-subtitle" th:text="#{rooms.form.subtitle}">Update room details and availability</p>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <form th:action="@{/admin/rooms/edit/{id}(id=${roomDto.id})}"
                  th:object="${roomDto}"
                  method="post">
                <input type="hidden" th:field="*{id}"/>
                <div class="form-group">
                    <label th:text="#{rooms.form.name}">Name</label>
                    <input type="text" th:field="*{name}" th:placeholder="#{rooms.form.name_placeholder}"/>
                    <span class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                </div>
                <div class="form-group">
                    <label th:text="#{rooms.form.capacity}">Capacity</label>
                    <input type="number" th:field="*{capacity}" th:placeholder="#{rooms.form.capacity_placeholder}" min="1"/>
                    <span class="field-error" th:if="${#fields.hasErrors('capacity')}" th:errors="*{capacity}"></span>
                </div>
                <div class="form-group">
                    <label th:text="#{rooms.form.status}">Status</label>
                    <select th:field="*{status}">
                        <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}"></option>
                    </select>
                    <span class="field-error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></span>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" th:text="#{rooms.form.submit}">Update</button>
                    <a th:href="@{/admin/rooms}" class="btn btn-secondary" th:text="#{rooms.form.cancel}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>
<footer th:text="#{index.footer.copyright}">&copy; 2026 Serenity Spa &nbsp;&mdash;&nbsp; All rights reserved</footer>
</body>
</html>
