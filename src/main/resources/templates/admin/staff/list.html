<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Manage Staff — Serenity Spa</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main>
    <div class="container">
        <div class="page-header">
            <h1>Staff</h1>
        </div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${#lists.isEmpty(staffList)}" class="empty-state">
            <p>No staff found.</p>
        </div>
        <div th:if="not ${#lists.isEmpty(staffList)}" class="table-wrapper">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Specialization</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="staff : ${staffList}">
                    <td th:text="${staff.firstName}"></td>
                    <td th:text="${staff.lastName}"></td>
                    <td th:text="${staff.specialization}"></td>
                    <td class="td-actions">
                        <a th:href="@{/admin/staff/edit/{id}(id=${staff.id})}" class="btn btn-warning btn-sm">Edit</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<footer>&copy; 2026 Serenity Spa &nbsp;&mdash;&nbsp; All rights reserved</footer>
</body>
</html>
