<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:lang="${#locale.language}"
      lang="${#locale.language}">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{staff.list.title}">Manage Staff — Serenity Spa</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main>
    <div class="container">
        <div class="page-header">
            <h1 th:text="#{staff.list.heading}">Staff</h1>
        </div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${#lists.isEmpty(staffList)}" class="empty-state">
            <p th:text="#{staff.list.empty}">No staff found.</p>
        </div>
        <div th:if="not ${#lists.isEmpty(staffList)}" class="table-wrapper">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th th:text="#{staff.list.table.first_name}">First Name</th>
                    <th th:text="#{staff.list.table.last_name}">Last Name</th>
                    <th th:text="#{staff.list.table.specialization}">Specialization</th>
                    <th th:text="#{staff.list.table.actions}">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="staff : ${staffList}">
                    <td th:text="${staff.firstName}"></td>
                    <td th:text="${staff.lastName}"></td>
                    <td th:text="${staff.specialization}"></td>
                    <td>
                        <a th:href="@{/admin/staff/edit/{id}(id=${staff.id})}" class="btn btn-warning btn-sm" th:text="#{staff.list.edit_btn}">Edit</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<footer th:text="#{index.footer.copyright}">&copy; 2026 Serenity Spa &nbsp;&mdash;&nbsp; All rights reserved</footer>
</body>
</html>
