<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit Staff — Serenity Spa</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main>
    <div class="container">
        <div class="form-card">
            <h1 class="form-title">Edit Staff Member</h1>
            <p class="form-subtitle">Update staff details and specialization</p>
            <!-- Error alert -->
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <form th:action="@{/admin/staff/edit/{id}(id=${staffDto.id})}"
                  th:object="${staffDto}"
                  method="post">
                <!-- Hidden id field -->
                <input type="hidden" th:field="*{id}"/>
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" th:field="*{firstName}" placeholder="e.g. Elena"/>
                    <span class="field-error" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></span>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" th:field="*{lastName}" placeholder="e.g. Todorova"/>
                    <span class="field-error" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></span>
                </div>
                <div class="form-group">
                    <label>Specialization</label>
                    <input type="text" th:field="*{specialization}" placeholder="e.g. Deep Tissue & Hot Stone"/>
                    <span class="field-error" th:if="${#fields.hasErrors('specialization')}" th:errors="*{specialization}"></span>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Update</button>
                    <a th:href="@{/admin/staff}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>
<footer>&copy; 2026 Serenity Spa &nbsp;&mdash;&nbsp; All rights reserved</footer>
</body>
</html>
