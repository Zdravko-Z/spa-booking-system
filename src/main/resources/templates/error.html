<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Something went wrong — Serenity Spa</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main>
    <div class="container">
        <div class="page-header">
            <h1>Oops!</h1>
            <p>We encountered an unexpected issue</p>
        </div>
        <div class="alert alert-error" th:text="${error}">An unexpected error occurred.</div>
        <div style="text-align: center; margin-top: 2rem;">
            <a th:href="@{/}" class="btn btn-primary">Return to Home</a>
        </div>
    </div>
</main>
<footer>&copy; 2026 Serenity Spa &nbsp;&mdash;&nbsp; All rights reserved</footer>
</body>
</html>
