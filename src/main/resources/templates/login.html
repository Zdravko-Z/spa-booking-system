<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — Serenity Spa</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main>
    <div class="form-card">
        <h1 class="form-title">Welcome Back</h1>
        <p class="form-subtitle">Sign in to manage your bookings</p>
        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>
        <form th:action="@{/login}" th:object="${loginDto}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" th:field="*{username}" placeholder="your username"/>
                <span class="field-error" th:if="${#fields.hasErrors('username')}"
                      th:errors="*{username}"></span>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}" placeholder="••••••••"/>
                <span class="field-error" th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}"></span>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">
                Sign In
            </button>
        </form>
        <p style="text-align:center; margin-top:1.5rem; font-size:0.84rem; color:var(--muted);">
            Don't have an account?
            <a th:href="@{/register}" style="color:var(--gold);">Register</a>
        </p>
    </div>
</main>
<footer>&copy; 2026 Serenity Spa &nbsp;&mdash;&nbsp; All rights reserved</footer>
</body>
</html>
