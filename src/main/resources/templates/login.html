<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <title>Login — Serenity Spa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main>
    <div class="form-card">
        <h1 class="form-title">Welcome Back</h1>
        <p class="form-subtitle">Sign in to manage your bookings</p>
        <div class="alert alert-error" th:if="${param.error != null}" th:text="'Invalid username or password'"></div>
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="your username"/>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-field">
                    <input type="password" id="password" name="password" required placeholder="••••••••"/>
                    <span class="toggle-password" data-target="password">
                                <i class="fa-regular fa-eye fa-fw"></i>
                    </span>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">Sign In</button>
        </form>
        <p style="text-align:center; margin-top:1.5rem; font-size:0.84rem; color:var(--muted);">
            Don't have an account?
            <a th:href="@{/register}" style="color:var(--gold);">Register</a>
        </p>
    </div>
</main>
<footer>&copy; 2026 Serenity Spa &nbsp;&mdash;&nbsp; All rights reserved</footer>
<script th:src="@{/js/password-toggle.js}"></script>
</body>
</html>
